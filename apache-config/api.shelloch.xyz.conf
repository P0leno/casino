<VirtualHost *:80>
    ServerName api.shelloch.xyz

    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName api.shelloch.xyz

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/shelloch.xyz/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/shelloch.xyz/privkey.pem

    # API Proxy to FastAPI backend
    ProxyPreserveHost On
    ProxyPass / http://localhost:3779/
    ProxyPassReverse / http://localhost:3779/

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/api.shelloch.xyz-error.log
    CustomLog ${APACHE_LOG_DIR}/api.shelloch.xyz-access.log combined

    # Security Headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    
    # CORS управляется FastAPI backend
    # Не устанавливаем CORS заголовки здесь, чтобы избежать конфликтов
</VirtualHost>
