# HTTP -> HTTPS redirect
<VirtualHost *:80>
    ServerName api.shelloch.xyz

    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

# HTTPS Main Config
<VirtualHost *:443>
    ServerName api.shelloch.xyz

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/shelloch.xyz/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/shelloch.xyz/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # Proxy Settings
    ProxyPreserveHost On
    ProxyRequests Off
    
    # WebSocket для краш игры (ДОЛЖЕН быть ПЕРЕД общим ProxyPass!)
    ProxyPass /api/crash/ws ws://127.0.0.1:3779/api/crash/ws
    ProxyPassReverse /api/crash/ws ws://127.0.0.1:3779/api/crash/ws
    
    # Общий Proxy to FastAPI backend
    ProxyPass / http://127.0.0.1:3779/
    ProxyPassReverse / http://127.0.0.1:3779/

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/api.shelloch.xyz-error.log
    CustomLog ${APACHE_LOG_DIR}/api.shelloch.xyz-access.log combined

    # Security Headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
</VirtualHost>
