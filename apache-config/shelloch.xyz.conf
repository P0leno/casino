<VirtualHost *:80>
    ServerName shelloch.xyz
    ServerAlias www.shelloch.xyz

    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName shelloch.xyz
    ServerAlias www.shelloch.xyz

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/shelloch.xyz/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/shelloch.xyz/privkey.pem

    DocumentRoot /var/www/shell

    <Directory /var/www/shell>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # React Router support
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/shelloch.xyz-error.log
    CustomLog ${APACHE_LOG_DIR}/shelloch.xyz-access.log combined

    # Security Headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
</VirtualHost>
