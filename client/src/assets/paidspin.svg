<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Градиенты для стекла -->
    <linearGradient id="glassGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.2);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05);stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0FBCE0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a8aa8;stop-opacity:1" />
    </linearGradient>
    
    <!-- Фильтр для blur эффекта -->
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
  </defs>
  
  <!-- Основной круг со стеклянным эффектом -->
  <circle cx="100" cy="100" r="85" 
          fill="url(#glassGradient2)" 
          stroke="rgba(255,255,255,0.2)" 
          stroke-width="2"
          filter="url(#blur2)"
          opacity="0.8"/>
  
  <!-- Внутренний круг с золотым акцентом -->
  <circle cx="100" cy="100" r="70" 
          fill="none" 
          stroke="url(#goldGradient)" 
          stroke-width="3"
          opacity="0.7"/>
  
  <!-- Четыре лопасти спина (премиум версия) -->
  <g transform="translate(100,100)">
    <!-- Лопасть 1 -->
    <path d="M 0,-55 Q 25,-35 5,-10 Q -5,-35 0,-55 Z" 
          fill="url(#goldGradient)" 
          opacity="0.9"
          transform="rotate(0)"/>
    
    <!-- Лопасть 2 -->
    <path d="M 0,-55 Q 25,-35 5,-10 Q -5,-35 0,-55 Z" 
          fill="url(#goldGradient)" 
          opacity="0.9"
          transform="rotate(90)"/>
    
    <!-- Лопасть 3 -->
    <path d="M 0,-55 Q 25,-35 5,-10 Q -5,-35 0,-55 Z" 
          fill="url(#goldGradient)" 
          opacity="0.9"
          transform="rotate(180)"/>
    
    <!-- Лопасть 4 -->
    <path d="M 0,-55 Q 25,-35 5,-10 Q -5,-35 0,-55 Z" 
          fill="url(#goldGradient)" 
          opacity="0.9"
          transform="rotate(270)"/>
  </g>
  
  <!-- Центральный круг с монетой -->
  <circle cx="100" cy="100" r="20" 
          fill="url(#glassGradient2)" 
          stroke="url(#goldGradient)" 
          stroke-width="3"/>
  
  <!-- Символ звезды в центре -->
  <path d="M 100,85 L 105,95 L 115,95 L 107,102 L 110,112 L 100,105 L 90,112 L 93,102 L 85,95 L 95,95 Z"
        fill="url(#goldGradient)"/>
  
  <!-- Блики -->
  <ellipse cx="80" cy="80" rx="25" ry="35" 
           fill="rgba(255,255,255,0.2)" 
           transform="rotate(-30 80 80)"/>
  
  <!-- Декоративные звездочки вокруг -->
  <circle cx="65" cy="50" r="3" fill="url(#goldGradient)" opacity="0.8"/>
  <circle cx="135" cy="50" r="3" fill="url(#goldGradient)" opacity="0.8"/>
  <circle cx="65" cy="150" r="3" fill="url(#goldGradient)" opacity="0.8"/>
  <circle cx="135" cy="150" r="3" fill="url(#goldGradient)" opacity="0.8"/>
  
  <!-- Текст "PAID" -->
  <text x="100" y="170" 
        font-family="Arial, sans-serif" 
        font-size="18" 
        font-weight="bold" 
        fill="url(#goldGradient)" 
        text-anchor="middle">PREMIUM</text>
</svg>
