<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Градиенты для стекла -->
    <linearGradient id="glassGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.2);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05);stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0FBCE0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a8aa8;stop-opacity:1" />
    </linearGradient>
    
    <!-- Фильтр для blur эффекта -->
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
  </defs>
  
  <!-- Основной круг со стеклянным эффектом -->
  <circle cx="100" cy="100" r="85" 
          fill="url(#glassGradient1)" 
          stroke="rgba(255,255,255,0.2)" 
          stroke-width="2"
          filter="url(#blur1)"
          opacity="0.8"/>
  
  <!-- Внутренний круг -->
  <circle cx="100" cy="100" r="70" 
          fill="none" 
          stroke="url(#accentGradient1)" 
          stroke-width="3"
          opacity="0.6"/>
  
  <!-- Три лопасти спина -->
  <g transform="translate(100,100)">
    <!-- Лопасть 1 -->
    <path d="M 0,-50 Q 20,-30 0,-10 Q -20,-30 0,-50 Z" 
          fill="url(#accentGradient1)" 
          opacity="0.8"
          transform="rotate(0)"/>
    
    <!-- Лопасть 2 -->
    <path d="M 0,-50 Q 20,-30 0,-10 Q -20,-30 0,-50 Z" 
          fill="url(#accentGradient1)" 
          opacity="0.8"
          transform="rotate(120)"/>
    
    <!-- Лопасть 3 -->
    <path d="M 0,-50 Q 20,-30 0,-10 Q -20,-30 0,-50 Z" 
          fill="url(#accentGradient1)" 
          opacity="0.8"
          transform="rotate(240)"/>
  </g>
  
  <!-- Центральный круг -->
  <circle cx="100" cy="100" r="15" 
          fill="url(#glassGradient1)" 
          stroke="url(#accentGradient1)" 
          stroke-width="2"/>
  
  <!-- Блики -->
  <ellipse cx="85" cy="85" rx="20" ry="30" 
           fill="rgba(255,255,255,0.15)" 
           transform="rotate(-30 85 85)"/>
  
  <!-- Текст "FREE" -->
  <text x="100" y="165" 
        font-family="Arial, sans-serif" 
        font-size="20" 
        font-weight="bold" 
        fill="url(#accentGradient1)" 
        text-anchor="middle">FREE</text>
</svg>
